<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuralLink | GVS Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3b82f6; --green: #10b981; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 40px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 900px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); }
        .full { grid-column: span 2; text-align: center; background: linear-gradient(135deg, #1e293b, #0f172a); }
        .label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 3rem; font-weight: 600; margin: 10px 0; }
        .unit { font-size: 1rem; color: #64748b; }
        canvas { max-height: 150px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card full">
        <span class="label">Directional Vector</span>
        <div class="value" id="dir-val" style="color: var(--blue);">CONNECTING...</div>
    </div>

    <div class="card">
        <span class="label">Voltage Flux (V)</span>
        <canvas id="vChart"></canvas>
        <div class="value" id="v-num">0.00</div>
    </div>

    <div class="card">
        <span class="label">Induced Current (mA)</span>
        <canvas id="iChart"></canvas>
        <div class="value" id="i-num">0.00</div>
    </div>
</div>

<script>
    const FB_URL = "https://gvsh-ba71c-default-rtdb.asia-southeast1.firebasedatabase.app/telemetry.json";

    const cfg = (color) => ({
        type: 'line',
        data: { labels: Array(15).fill(''), datasets: [{ data: Array(15).fill(0), borderColor: color, tension: 0.4, pointRadius: 0 }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });

    const vChart = new Chart(document.getElementById('vChart'), cfg('#3b82f6'));
    const iChart = new Chart(document.getElementById('iChart'), cfg('#10b981'));

    async function update() {
        try {
            const r = await fetch(FB_URL);
            const d = await r.json();
            if (d) {
                document.getElementById('dir-val').innerText = d.dir || "CENTER";
                document.getElementById('v-num').innerText = d.v || "0.00";
                document.getElementById('i-num').innerText = d.i || "0.00";

                [vChart, iChart].forEach((c, i) => {
                    c.data.datasets[0].data.push(i === 0 ? d.v : d.i);
                    c.data.datasets[0].data.shift();
                    c.update('none');
                });
            }
        } catch (e) { console.log("Offline"); }
    }
    setInterval(update, 500);
</script>
</body>
</html>
